services:
  server:
    build: .
    command: ["server", "-p", "9867"]
    ports:
      - "9867:9867"

  client1:
    build: .
    command: ["client", "-s", "ws://server:9867", "-d", "/workspace", "--id", "dev1"]

  client2:
    build: .
    command: ["client", "-s", "ws://server:9867", "-d", "/workspace", "--id", "dev2"]
