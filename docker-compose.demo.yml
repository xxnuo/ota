services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["server", "--foreground", "--port", "9867", "--dir", "/workspace"]
    volumes:
      - ./testdata/demo:/workspace
    ports:
      - "9867:9867"
    networks:
      - ota-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9867/health"]
      interval: 3s
      timeout: 2s
      retries: 10

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    command: ["client", "--server", "ws://server:9867", "--dir", "/workspace", "--cmd", "air"]
    ports:
      - "18080:8080"
    networks:
      - ota-net
    depends_on:
      server:
        condition: service_healthy

networks:
  ota-net:
    driver: bridge
